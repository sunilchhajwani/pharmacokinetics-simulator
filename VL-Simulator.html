<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Laryngoscopy Simulator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#1a1a2e;color:#e0e6f0;min-height:100vh;overflow-x:hidden}
.header{background:linear-gradient(135deg,#16213e,#0f3460);padding:20px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #1e3a5f}
.header h1{font-size:24px;font-weight:700;color:#e94560}
.header .subtitle{font-size:12px;color:#94a3b8}
.tabs{display:flex;background:#16213e;padding:0 16px;border-bottom:1px solid #1e3a5f}
.tab{padding:14px 24px;font-size:14px;font-weight:600;color:#94a3b8;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s}
.tab:hover{color:#e0e6f0}
.tab.active{color:#e94560;border-bottom-color:#e94560}
.main{display:grid;grid-template-columns:1fr 340px;min-height:calc(100vh - 120px)}
.screen-view{background:#000;padding:16px;display:flex;align-items:center;justify-content:center;position:relative}
.screen-view svg{width:100%;max-width:600px;height:auto}
.controls{background:#16213e;padding:16px;overflow-y:auto;border-left:1px solid #1e3a5f}
.section{margin-bottom:20px}
.section-title{font-size:13px;font-weight:600;color:#e94560;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.step{display:flex;gap:12px;margin-bottom:12px;padding:12px;background:#0f3460;border-radius:8px;cursor:pointer;transition:all .2s;border:2px solid transparent}
.step:hover{border-color:#e94560;transform:translateX(4px)}
.step.active{border-color:#e94560;background:rgba(233,69,96,0.15)}
.step.completed{border-color:#4ade80}
.step-num{width:32px;height:32px;background:#1e3a5f;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0}
.step.active .step-num{background:#e94560}
.step.completed .step-num{background:#4ade80}
.step-content{flex:1}
.step-title{font-size:14px;font-weight:600;margin-bottom:4px}
.step-desc{font-size:12px;color:#94a3b8;line-height:1.4}
.blade-options{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.blade-card{padding:16px;background:#0f3460;border-radius:8px;text-align:center;cursor:pointer;transition:all .2s;border:2px solid transparent}
.blade-card:hover{border-color:#e94560}
.blade-card.selected{border-color:#e94560;background:rgba(233,69,96,0.1)}
.blade-card .blade-name{font-size:14px;font-weight:600;margin-bottom:4px}
.blade-card .blade-desc{font-size:11px;color:#94a3b8}
.grade-view{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.grade-card{padding:12px;background:#0f3460;border-radius:8px;text-align:center;cursor:pointer;transition:all .2s;border:2px solid transparent}
.grade-card:hover{border-color:#e94560}
.grade-card.selected{border-color:#e94560}
.grade-card .grade{font-size:16px;font-weight:700;color:#e94560;margin-bottom:4px}
.grade-card .desc{font-size:10px;color:#94a3b8}
.anatomy-labels{position:absolute;bottom:20px;left:20px;background:rgba(0,0,0,0.8);padding:12px;border-radius:8px;font-size:12px}
.anatomy-labels div{margin-bottom:6px;display:flex;align-items:center;gap:8px}
.anatomy-labels .dot{width:12px;height:12px;border-radius:50%}
.info-box{background:#0f3460;border-radius:8px;padding:16px;margin-bottom:12px}
.info-box h4{font-size:13px;color:#e94560;margin-bottom:8px}
.info-box p{font-size:12px;color:#94a3b8;line-height:1.5}
.tip-box{background:rgba(74,222,128,0.1);border:1px solid rgba(74,222,128,0.3);border-radius:8px;padding:12px;font-size:12px;color:#4ade80;margin-bottom:12px}
.warning-box{background:rgba(251,191,36,0.1);border:1px solid rgba(251,191,36,0.3);border-radius:8px;padding:12px;font-size:12px;color:#fbbf24;margin-bottom:12px}
.btn{padding:10px 20px;background:#e94560;color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;width:100%}
.btn:hover{background:#d63651}
.btn:disabled{background:#334155;cursor:not-allowed}
.nav-btns{display:flex;gap:8px;margin-top:16px}
.nav-btns .btn{flex:1}
@media(max-width:900px){.main{grid-template-columns:1fr}}
</style>
</head>
<body>

  <div>
    <h1>🎬 Video Laryngoscopy Simulator</h1>
    <div class="subtitle">Interactive Airway Management Training</div>
  </div>

  <div class="tab active" onclick="switchTab('procedure')">📋 Procedure Guide</div>
  <div class="tab" onclick="switchTab('anatomy')">🔬 Anatomy Reference</div>
  <div class="tab" onclick="switchTab('grades')">🎯 Cormack-Lehane Grades</div>
  <div class="tab" onclick="switchTab('quiz')">❓ Practice Quiz</div>
</div>
<div class="main" id="mainContent">
  <!-- Left: Screen View -->
  <div class="screen-view" id="screenView">
    <!-- SVG will be rendered here -->
  </div>
  <!-- Right: Controls -->
  <div class="controls" id="controlsPanel">

let currentTab = 'procedure';
let currentStep = 0;
let selectedBlade = 'macintosh';
let selectedGrade = 1;
let quizAnswers = [];

const gradeNames = ['Grade 1 - Complete', 'Grade 2 - Posterior', 'Grade 3 - Epiglottis', 'Grade 4 - None'];

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  renderPanel();
}

function selectBlade(blade) {
  selectedBlade = blade;
  renderPanel();
}

function selectGrade(grade) {
  selectedGrade = grade;
  renderPanel();
}

function nextStep() {
  if (currentStep < PROCEDURE_STEPS.length - 1) {
    currentStep++;
    renderPanel();
  }
}

function prevStep() {
  if (currentStep > 0) {
    currentStep--;
    renderPanel();
  }
}

function goToStep(step) {
  currentStep = step;
  renderPanel();
}

function renderPanel() {
  const controls = document.getElementById('controlsPanel');
  
  switch(currentTab) {
    case 'procedure':
      renderProcedurePanel(controls);
      break;
    case 'anatomy':
      renderAnatomyPanel(controls);
      break;
    case 'grades':
      renderGradesPanel(controls);
      break;
    case 'quiz':
      renderQuizPanel(controls);
      break;
  }
}

  controls.innerHTML = `

          ⚠️ <strong>Warnings:</strong><br>

  controls.innerHTML = `
    <div class="section">
      <div class="section-title">❓ Practice Quiz</div>
      
      ${questions.map((q, i) => `
        <div class="info-box" style="margin-bottom:12px">
          <h4>Question ${i+1}:</h4>
          <p style="margin-top:8px"><strong>${q.q}</strong></p>
          <div style="margin-top:8px">
            ${q.options.map((opt, j) => `
              <div onclick="checkAnswer(${i}, ${j}, ${q.correct})" 
                   style="padding:8px;background:#1e293b;margin:4px 0;border-radius:4px;cursor:pointer">
                ${opt}
              </div>
            `).join('')}
          </div>
        </div>
      `).join('')}
    </div>
  `;
  
  renderView('vocalCordsView');
}

function checkAnswer(qIndex, selected, correct) {
  const boxes = document.querySelectorAll('.info-box');
  const options = boxes[qIndex].querySelectorAll('div[onclick*="checkAnswer"]');
  
  options.forEach((opt, i) => {
    opt.style.background = i === correct ? '#059669' : (i === selected ? '#dc2626' : '#1e293b');
  });
}

function renderView(viewName) {
  const screenView = document.getElementById('screenView');
  screenView.innerHTML = SVG_ANATOMY[viewName] || SVG_ANATOMY.oralCavity;
}

// Initialize
document.addEventListener('DOMContentLoaded', () => {
  renderPanel();
});
</script>
</body>
</html>
